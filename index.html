<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
    <div class="calc">

        <div class="inputBox">
            <input type="text" readonly>
        </div>

        <div class="firstRow">
            
            <div><button class="mis">delete</button></div>
            <div><button class="operator">/</button></div>
        </div>

        <div class="firstRow">
            <div><button class="number">7</button></div>
            <div><button class="number">8</button></div>
            <div><button class="number">9</button></div>
            <div><button class="operator">*</button></div>

        </div>

        <div class="firstRow">
            <div><button class="number">4</button></div>
            <div><button class="number">5</button></div>
            <div><button class="number">6</button></div>
            <div><button class="operator">-</button></div>
        </div>

        <div class="firstRow">
            <div><button class="number">1</button></div>
            <div><button class="number">2</button></div>
            <div><button class="number">3</button></div>
            <div><button class="operator">+</button></div>
        </div>

        <div class="firstRow">
            <div><button class="clear">C</button></div>
            <div><button class="number">0</button></div>
            <div><button class="mis">.</button></div>
            <div><button class="equalTo">=</button></div>
        </div>
        




    </div>







    <script src="main.js"></script>
</body>
</html>
